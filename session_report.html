<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap');
        
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(20, 30, 45, 1) 0%, rgba(13, 17, 23, 1) 90%);
        }
        
        .dashboard {
            background: rgba(22, 27, 34, 0.7);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 80%;
            max-width: 900px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
        }
        
        p.subtitle {
            color: #8b949e;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(33, 38, 45, 0.8);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #8b949e;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-container {
            background: rgba(33, 38, 45, 0.5);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .qualcomm-badge {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #484f58;
            letter-spacing: 2px;
        }

        /* --- NEW: HISTORY STYLES --- */
        .history-section {
            margin-top: 40px;
            background: rgba(33, 38, 45, 0.3);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-title {
            color: #58a6ff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        .history-scroll {
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #30363d transparent;
            border-radius: 8px;
        }

        .history-scroll::-webkit-scrollbar { width: 6px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        tr.history-row {
            cursor: pointer;
            transition: background 0.2s;
        }

        tr.history-row:hover {
            background: rgba(88, 166, 255, 0.1) !important;
        }

        th {
            text-align: left;
            color: #8b949e;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .score-pill {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1 id="mainTitle">Focus Analytics</h1>
            <p id="mainSubtitle" class="subtitle">Session Report Generated by Copilot+ PC</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="elapsedVal">4m 7s</div>
                <div class="stat-label">Session Elapsed</div>
            </div>
            <div class="stat-card" style="border-color: #bc8cff;">
                <div class="stat-value" id="focusVal">3m 32s</div>
                <div class="stat-label">Session Focus</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="distVal">0m 34s</div>
                <div class="stat-label" id="distLabel">Distracted (1x)</div>
            </div>
        </div>

        <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr); margin-top: -20px;">
            <div class="stat-card" style="background: rgba(88, 166, 255, 0.1);">
                <div class="stat-value">7m</div>
                <div class="stat-label">Total Lifetime Focus</div>
            </div>
            <div class="stat-card" style="background: rgba(188, 140, 255, 0.1);">
                <div class="stat-value">10</div>
                <div class="stat-label">Total Sessions Tracked</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="focusChart" height="100"></canvas>
        </div>

        <!-- --- NEW: HISTORY SECTION --- -->
        <div class="history-section">
            <div class="history-title">
                <span>Session Explorer (Click a row to view)</span>
                <span id="avgScore">--</span>
            </div>
            <div class="history-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Status</th>
                            <th>Duration</th>
                            <th>Focus</th>
                            <th>Dist.</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="qualcomm-badge">
            SYNCHRONIZED VIA QUALCOMM CLOUD EDGE NODE
        </div>
    </div>

    <script>
        // --- GLOBAL DATA ---
        const historyData = [{"id": 10, "created_at": "2026-04-05T10:29:00.693353+00:00", "elapsed_seconds": 247, "distracted_seconds": 34, "distraction_count": 1, "snooze_count": 1}, {"id": 9, "created_at": "2026-04-05T10:21:24.136152+00:00", "elapsed_seconds": 54, "distracted_seconds": 35, "distraction_count": 1, "snooze_count": 1}, {"id": 8, "created_at": "2026-04-05T10:13:44.838139+00:00", "elapsed_seconds": 66, "distracted_seconds": 36, "distraction_count": 1, "snooze_count": 1}, {"id": 7, "created_at": "2026-04-05T10:12:34.025357+00:00", "elapsed_seconds": 50, "distracted_seconds": 0, "distraction_count": 0, "snooze_count": 0}, {"id": 6, "created_at": "2026-04-05T10:10:56.402537+00:00", "elapsed_seconds": 4, "distracted_seconds": 0, "distraction_count": 0, "snooze_count": 0}, {"id": 5, "created_at": "2026-04-05T10:10:42.091964+00:00", "elapsed_seconds": 2, "distracted_seconds": 0, "distraction_count": 0, "snooze_count": 0}, {"id": 4, "created_at": "2026-04-05T10:10:06.625024+00:00", "elapsed_seconds": 6, "distracted_seconds": 0, "distraction_count": 0, "snooze_count": 0}, {"id": 3, "created_at": "2026-04-05T10:08:43.468687+00:00", "elapsed_seconds": 54, "distracted_seconds": 37, "distraction_count": 1, "snooze_count": 1}, {"id": 2, "created_at": "2026-04-05T10:06:07.109765+00:00", "elapsed_seconds": 60, "distracted_seconds": 35, "distraction_count": 1, "snooze_count": 1}, {"id": 1, "created_at": "2026-04-05T10:03:03.624895+00:00", "elapsed_seconds": 79, "distracted_seconds": 0, "distraction_count": 1, "snooze_count": 1}];
        
        const ctx = document.getElementById('focusChart').getContext('2d');
        let focusChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Productivity Metrics (Minutes)'],
                datasets: [
                    {
                        label: 'Pure Focus Time',
                        data: [3.54],
                        backgroundColor: 'rgba(88, 166, 255, 0.8)',
                        borderColor: '#58a6ff',
                        borderWidth: 1,
                        borderRadius: 5
                    },
                    {
                        label: 'Distracted Time',
                        data: [0.58],
                        backgroundColor: 'rgba(248, 81, 73, 0.8)',
                        borderColor: '#f85149',
                        borderWidth: 1,
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#c9d1d9', font: { family: 'Inter' } } } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                }
            }
        });

        function updateDashboard(session) {
            const total = session.elapsed_seconds || 0;
            const dist = session.distracted_seconds || 0;
            const count = session.distraction_count || 0;
            const focus = Math.max(0, total - dist);
            
            // Update Text
            document.getElementById('mainSubtitle').innerText = `Viewing Historical Data for Session #${session.id}`;
            document.getElementById('elapsedVal').innerText = `${Math.floor(total/60)}m ${total%60}s`;
            document.getElementById('focusVal').innerText = `${Math.floor(focus/60)}m ${focus%60}s`;
            document.getElementById('distVal').innerText = `${Math.floor(dist/60)}m ${dist%60}s`;
            document.getElementById('distLabel').innerText = `Distracted (${count}x)`;

            // Update Chart
            focusChart.data.datasets[0].data = [(focus/60.0).toFixed(2)];
            focusChart.data.datasets[1].data = [(dist/60.0).toFixed(2)];
            focusChart.update();

            // Scroll to top to see the new data
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- RENDER HISTORY TABLE ---
        const tbody = document.getElementById('historyBody');
        let totalScore = 0;

        historyData.forEach(session => {
            const row = document.createElement('tr');
            row.className = "history-row";
            const total = session.elapsed_seconds || 0;
            const dist = session.distracted_seconds || 0;
            const focus = Math.max(0, total - dist);
            const focusPct = total > 0 ? (focus / total * 100) : 0;
            totalScore += focusPct;

            const scoreColor = focusPct > 80 ? "#238636" : (focusPct > 50 ? "#d29922" : "#f85149");

            row.innerHTML = `
                <td>#${session.id}</td>
                <td><span class="score-pill" style="background: ${scoreColor}">${Math.round(focusPct)}% Focus</span></td>
                <td>${Math.floor(total/60)}m ${total%60}s</td>
                <td>${Math.floor(focus/60)}m</td>
                <td style="color: ${dist > 0 ? '#f85149' : '#8b949e'}">${Math.floor(dist/60)}m</td>
            `;
            
            row.onclick = () => updateDashboard(session);
            tbody.appendChild(row);
        });

        if (historyData.length > 0) {
            document.getElementById('avgScore').innerText = `Avg Score: ${Math.round(totalScore/historyData.length)}%`;
        }
    </script>
</body>
</html>
